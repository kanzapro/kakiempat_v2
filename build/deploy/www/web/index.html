<html lang="id">
<head>

  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kaki Empat — Platform Pengasuh Hewan Terpercaya di Indonesia</title>
  <meta name="description" content="Temukan pengasuh hewan terverifikasi untuk dog walking, pet sitting, grooming, dan training. Aman, transparan, dan mudah digunakan.">
  <meta name="keywords" content="pengasuh hewan, pet sitter, dog walking, jasa hewan peliharaan, kaki empat, pet sitting indonesia">
  <link rel="canonical" href="https://www.kakiempat.com/">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Kaki Empat">
  <meta property="og:title" content="Kaki Empat — Pengasuh Hewan Terpercaya">
  <meta property="og:description" content="Hewanmu bahagia, kamu tenang. Temukan pengasuh terbaik di dekatmu.">
  <meta property="og:url" content="https://www.kakiempat.com/">
  <meta property="og:image" content="https://www.kakiempat.com/icons/Icon-512.png">
  <meta property="og:locale" content="id_ID">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Kaki Empat — Pengasuh Hewan Terpercaya">
  <meta name="twitter:description" content="Hewanmu bahagia, kamu tenang. Temukan pengasuh terbaik di dekatmu.">
  <meta name="twitter:image" content="https://www.kakiempat.com/icons/Icon-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Kaki Empat">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #FAFAFA;
    }

    #loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #FAFAFA;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: #1B5E20;
      transition: opacity 0.3s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading img {
      animation: fade-in 0.6s ease-out;
    }

    #loading p {
      margin: 0;
      font-size: 16px;
      font-weight: 500;
      animation: fade-in 0.8s ease-out;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <noscript>
    <h1>Kaki Empat — Platform Pengasuh Hewan Terpercaya</h1>
    <p>Temukan pengasuh hewan terverifikasi untuk dog walking, pet sitting, grooming, dan training di Indonesia.</p>
    <p><a href="https://owner.kakiempat.com">Masuk sebagai pemilik hewan</a> · <a href="https://sitter.kakiempat.com">Daftar sebagai pengasuh</a></p>
  </noscript>

  <div id="loading">
    <img src="logo.png" alt="Kaki Empat" width="100">
    <p>Memuat...</p>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) {
        el.classList.add('hidden');
        setTimeout(function () { el.remove(); }, 350);
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
