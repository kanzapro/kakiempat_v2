# Deploy Kaki Empat v2 — tanpa FTP. Git pull + VersionControlDeployment dari server/UAPI.

name: 🚀 Kaki Empat v2 Git-Pull Deployment (No-FTP Bypass)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: cpanel-git-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CPANEL_HOST: kakiempat.com
  CPANEL_USER: kakiempa

jobs:
  deploy:
    name: ⚡ Deploy via server webhook
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Validasi secrets
        run: |
          test -n "${{ secrets.FTP_PASSWORD }}"
          test -n "${{ secrets.GIT_DEPLOY_SECRET }}"

      - name: Provision repo Git (idempotent)
        env:
          CPANEL_PASS: ${{ secrets.FTP_PASSWORD }}
          CPANEL_REPO_PATH: ${{ secrets.CPANEL_REPO_PATH }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x scripts/ci/*.sh
          bash scripts/ci/provision_cpanel_git.sh || true

      - name: Bootstrap secret + config (deploy handler embedded)
        env:
          CPANEL_PASS: ${{ secrets.FTP_PASSWORD }}
          CPANEL_REPO_PATH: ${{ secrets.CPANEL_REPO_PATH }}
          GIT_DEPLOY_SECRET: ${{ secrets.GIT_DEPLOY_SECRET }}
        run: bash scripts/ci/bootstrap_deploy_hook.sh || true

      - name: Git pull + deploy via UAPI
        env:
          CPANEL_PASS: ${{ secrets.FTP_PASSWORD }}
          CPANEL_REPO_PATH: ${{ secrets.CPANEL_REPO_PATH }}
          BRANCH: ${{ github.ref_name }}
        run: |
          REPO="${CPANEL_REPO_PATH:-/home/kakiempa/repo_kakiempat}"
          enc_repo=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$REPO'''))")
          enc_branch=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$BRANCH'''))")
          echo "=== VersionControl/update (git pull) ==="
          bash scripts/ci/cpanel_curl_retry.sh \
            "VersionControl/update?repository_root=${enc_repo}&branch=${enc_branch}" 3 || true
          sleep 45
          echo "=== VersionControlDeployment/create (.cpanel.yml) ==="
          bash scripts/ci/cpanel_curl_retry.sh \
            "VersionControlDeployment/create?repository_root=${enc_repo}" 5 || true

      - name: Trigger deploy via config (localhost UAPI, port 443)
        env:
          DEPLOY_SECRET: ${{ secrets.GIT_DEPLOY_SECRET }}
          BRANCH: ${{ github.ref_name }}
        run: |
          for attempt in $(seq 1 3); do
            for url in \
              "https://api.kakiempat.com/.git_deploy_config.php?deploy=1" \
              "https://www.api.kakiempat.com/.git_deploy_config.php?deploy=1"; do
              code=$(curl -sS -o /tmp/out.json -w "%{http_code}" --max-time 300 \
                -H "X-Deploy-Secret: ${DEPLOY_SECRET}" \
                "${url}&branch=${BRANCH}&secret=${DEPLOY_SECRET}" || echo "000")
              echo "trigger $attempt $url HTTP $code"
              cat /tmp/out.json || true
              if grep -q '"ok":true' /tmp/out.json 2>/dev/null && grep -q '"deploy"' /tmp/out.json 2>/dev/null; then exit 0; fi
            done
            sleep 20
          done
          echo "config trigger tidak tersedia — lanjut polling UAPI async"

      - name: Verifikasi deploy (poll health version)
        run: |
          sleep 90
          for attempt in $(seq 1 30); do
            ok=$(python3 - <<'PY' || echo 0
          import json, urllib.request
          try:
              with urllib.request.urlopen('https://api.kakiempat.com/health.php', timeout=30) as r:
                  d = json.load(r)
              v = tuple(int(x) for x in str(d.get('version', '0.0.0')).split('.'))
              print(1 if v >= (0, 2, 1) and d.get('mysql_ok') else 0)
          except Exception:
              print(0)
          PY
          )
            body=$(curl -sS --max-time 30 https://api.kakiempat.com/health.php 2>/dev/null || echo '{}')
            echo "poll $attempt ok=$ok $body"
            if [[ "$ok" == "1" ]]; then exit 0; fi
            sleep 30
          done
          echo "::error::Deploy belum terlihat — cek cPanel Git > Deployment log"
          exit 1
