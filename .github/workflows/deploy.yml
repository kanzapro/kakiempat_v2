# Deploy Kaki Empat v2 — git pull dari dalam server via HTTPS webhook (bypass FTP + timeout UAPI 5s).

name: 🚀 Kaki Empat v2 Git-Pull Deployment (No-FTP Bypass)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: cpanel-git-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CPANEL_HOST: kakiempat.com
  CPANEL_USER: kakiempa
  CPANEL_REPO_PATH: /home/kakiempa/repo_kakiempat

jobs:
  trigger-cpanel:
    name: ⚡ Trigger cPanel Auto Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validasi secrets
        run: |
          for s in FTP_USERNAME FTP_PASSWORD GIT_DEPLOY_SECRET; do
            if [[ -z "${!s:-}" ]]; then
              echo "::error::Secret $s belum diisi"
              exit 1
            fi
          done
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          GIT_DEPLOY_SECRET: ${{ secrets.GIT_DEPLOY_SECRET }}

      - name: Provision cPanel Git repo (sekali, idempotent)
        env:
          CPANEL_PASS: ${{ secrets.FTP_PASSWORD }}
          CPANEL_REPO_PATH: ${{ secrets.CPANEL_REPO_PATH }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x scripts/ci/cpanel_curl_retry.sh scripts/ci/provision_cpanel_git.sh
          bash scripts/ci/provision_cpanel_git.sh || true

      - name: Upload git_deploy_hook.php ke API
        env:
          CPANEL_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          chmod +x scripts/ci/cpanel_curl_retry.sh
          encoded_dir=$(python3 -c "import urllib.parse; print(urllib.parse.quote('/home/kakiempa/api.kakiempat.com'))")
          resp=$(bash scripts/ci/cpanel_curl_retry.sh \
            "Fileman/save_file_content?dir=${encoded_dir}&file=git_deploy_hook.php&content@hosting/api.kakiempat.com/git_deploy_hook.php" 8)
          echo "$resp"
          echo "$resp" | grep -q '"status":1'

      - name: Tulis .git_deploy_secret di server
        env:
          CPANEL_PASS: ${{ secrets.FTP_PASSWORD }}
          GIT_DEPLOY_SECRET: ${{ secrets.GIT_DEPLOY_SECRET }}
        run: |
          chmod +x scripts/ci/bootstrap_deploy_hook.sh
          bash scripts/ci/bootstrap_deploy_hook.sh

      - name: 🌐 Git pull + deploy via webhook (port 443)
        env:
          DEPLOY_SECRET: ${{ secrets.GIT_DEPLOY_SECRET }}
          BRANCH: ${{ github.ref_name }}
        run: |
          for attempt in 1 2 3; do
            for url in \
              "https://www.api.kakiempat.com/git_deploy_hook.php" \
              "https://api.kakiempat.com/git_deploy_hook.php"; do
              code=$(curl -sS -o /tmp/hook.json -w "%{http_code}" --max-time 600 \
                -H "X-Deploy-Secret: ${DEPLOY_SECRET}" \
                "${url}?branch=${BRANCH}&secret=${DEPLOY_SECRET}" || echo "000")
              echo "attempt $attempt $url -> HTTP $code"
              cat /tmp/hook.json || true
              if grep -q '"ok":true' /tmp/hook.json 2>/dev/null; then
                exit 0
              fi
              if [[ "$code" == "403" ]]; then
                echo "::error::Webhook forbidden — cek GIT_DEPLOY_SECRET vs .git_deploy_secret di server"
                exit 1
              fi
            done
            sleep 30
          done
          echo "::error::Webhook deploy gagal setelah 3 percobaan"
          exit 1

      - name: Verifikasi API health
        run: |
          sleep 15
          curl -sS --max-time 30 "https://www.api.kakiempat.com/health.php" || true

      - name: Ringkasan
        run: echo "Deploy selesai."
