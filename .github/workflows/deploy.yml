# Deploy Kaki Empat v2 — git pull dari dalam server (FTP/SFTP diblokir eksternal).
#
# Secrets: FTP_USERNAME, FTP_PASSWORD, CPANEL_REPO_PATH, GIT_DEPLOY_SECRET (webhook opsional)

name: 🚀 Kaki Empat v2 Git-Pull Deployment (No-FTP Bypass)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: cpanel-git-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CPANEL_HOST: kakiempat.com
  CPANEL_USER: kakiempa
  CPANEL_REPO_PATH: /home/kakiempa/repo_kakiempat
  CPANEL_REPO_NAME: kakiempat_v2

jobs:
  trigger-cpanel:
    name: ⚡ Trigger cPanel Auto Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validasi kredensial cPanel
        run: |
          if [[ -z "${{ secrets.FTP_USERNAME }}" || -z "${{ secrets.FTP_PASSWORD }}" ]]; then
            echo "::error::Butuh FTP_USERNAME + FTP_PASSWORD (kredensial cPanel) di GitHub Secrets"
            exit 1
          fi

      - name: Provision cPanel Git repo (idempotent)
        env:
          CPANEL_PASS: ${{ secrets.FTP_PASSWORD }}
          CPANEL_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          CPANEL_REPO_PATH: ${{ secrets.CPANEL_REPO_PATH }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x scripts/ci/cpanel_curl_retry.sh scripts/ci/provision_cpanel_git.sh
          bash scripts/ci/provision_cpanel_git.sh || echo "::warning::Provision dilewati"

      - name: 🌐 Git pull + .cpanel.yml via UAPI (retry)
        env:
          CPANEL_PASS: ${{ secrets.FTP_PASSWORD }}
          CPANEL_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          REPO_PATH: ${{ secrets.CPANEL_REPO_PATH }}
          BRANCH: ${{ github.ref_name }}
        run: |
          REPO_PATH="${REPO_PATH:-/home/kakiempa/repo_kakiempat}"
          export CPANEL_PASS CPANEL_TOKEN
          encoded_repo=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$REPO_PATH'''))")
          encoded_branch=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$BRANCH'''))")
          chmod +x scripts/ci/cpanel_curl_retry.sh
          resp=$(bash scripts/ci/cpanel_curl_retry.sh "VersionControl/update?repository_root=${encoded_repo}&branch=${encoded_branch}" 10)
          echo "$resp"
          echo "$resp" | grep -q '"status":1' || exit 1

      - name: Upload git_deploy_hook.php ke API (bootstrap)
        env:
          CPANEL_PASS: ${{ secrets.FTP_PASSWORD }}
          CPANEL_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
        run: |
          chmod +x scripts/ci/cpanel_curl_retry.sh
          HOOK="hosting/api.kakiempat.com/git_deploy_hook.php"
          encoded_dir=$(python3 -c "import urllib.parse; print(urllib.parse.quote('/home/kakiempa/api.kakiempat.com'))")
          resp=$(bash scripts/ci/cpanel_curl_retry.sh "Fileman/save_file_content?dir=${encoded_dir}&file=git_deploy_hook.php&content@${HOOK}" 5)
          echo "$resp" | grep -q '"status":1' || echo "::warning::Upload hook gagal (mungkin sudah ada)"

      - name: Bootstrap webhook secret di server
        env:
          CPANEL_PASS: ${{ secrets.FTP_PASSWORD }}
          CPANEL_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          GIT_DEPLOY_SECRET: ${{ secrets.GIT_DEPLOY_SECRET }}
        run: |
          chmod +x scripts/ci/bootstrap_deploy_hook.sh
          bash scripts/ci/bootstrap_deploy_hook.sh || echo "::warning::Bootstrap secret gagal"

      - name: Verifikasi API health
        run: |
          sleep 35
          for url in \
            "https://www.api.kakiempat.com/health.php" \
            "https://api.kakiempat.com/health.php"; do
            code=$(curl -sS -o /tmp/health.json -w "%{http_code}" --max-time 30 "$url" || echo "000")
            echo "$url -> HTTP $code"
            if [[ "$code" == "200" ]]; then
              cat /tmp/health.json
              exit 0
            fi
          done
          echo "::warning::Health check timeout — cek log cPanel Git deploy."

      - name: Ringkasan
        run: echo "Deploy selesai."
