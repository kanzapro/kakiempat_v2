# Deploy otomatis 6 domain Kaki Empat v2 — matrix paralel + path filter (delta only).
# www + 4 subdomain Flutter (owner, sitter, admin, staging) + api (PHP).
# FTP dari runner GitHub → docroot cPanel (bukan public_html/subfolder).
#
# Secrets: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD, FTP_PORT
# Lihat .github/DEPLOY_SECRETS.md

name: Automatic Multi-Domain Deploy (6 Domains)

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'lib/**'
      - 'web/**'
      - 'hosting/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'assets/**'
      - 'scripts/ci/**'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  API_BASE_URL: https://www.api.kakiempat.com
  FLUTTER_VERSION: '3.41.9'

jobs:
  changes:
    name: Detect changed domains
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      www: ${{ steps.filter.outputs.www }}
      owner: ${{ steps.filter.outputs.owner }}
      sitter: ${{ steps.filter.outputs.sitter }}
      admin: ${{ steps.filter.outputs.admin }}
      staging: ${{ steps.filter.outputs.staging }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Path filters per domain
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'hosting/api.kakiempat.com/**'
              - 'scripts/ci/prepare_api_package.sh'
            www:
              - 'lib/features/www/**'
              - 'lib/core/**'
              - 'web/**'
              - 'hosting/web_shared/**'
              - 'pubspec.yaml'
              - 'pubspec.lock'
              - 'assets/**'
              - 'scripts/ci/prepare_web_package.sh'
            owner:
              - 'lib/features/owner/**'
              - 'lib/core/**'
              - 'web/**'
              - 'hosting/web_shared/**'
              - 'pubspec.yaml'
              - 'pubspec.lock'
              - 'assets/**'
              - 'scripts/ci/prepare_web_package.sh'
            sitter:
              - 'lib/features/sitter/**'
              - 'lib/core/**'
              - 'web/**'
              - 'hosting/web_shared/**'
              - 'pubspec.yaml'
              - 'pubspec.lock'
              - 'assets/**'
              - 'scripts/ci/prepare_web_package.sh'
            admin:
              - 'lib/features/admin/**'
              - 'lib/core/**'
              - 'web/**'
              - 'hosting/web_shared/**'
              - 'pubspec.yaml'
              - 'pubspec.lock'
              - 'assets/**'
              - 'scripts/ci/prepare_web_package.sh'
            staging:
              - 'lib/features/owner/**'
              - 'lib/core/**'
              - 'web/**'
              - 'hosting/web_shared/**'
              - 'pubspec.yaml'
              - 'pubspec.lock'
              - 'assets/**'
              - 'scripts/ci/prepare_web_package.sh'

  build-web:
    name: Flutter build web (shared)
    needs: changes
    if: |
      needs.changes.outputs.www == 'true' ||
      needs.changes.outputs.owner == 'true' ||
      needs.changes.outputs.sitter == 'true' ||
      needs.changes.outputs.admin == 'true' ||
      needs.changes.outputs.staging == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze

      - name: flutter build web
        run: |
          flutter build web --release --tree-shake-icons \
            --dart-define=API_BASE_URL=${{ env.API_BASE_URL }} \
            --dart-define=CPANEL_MYSQL_HOST=localhost \
            --dart-define=CPANEL_MYSQL_DATABASE=kakiempa_v2 \
            --dart-define=CPANEL_MYSQL_USER=kakiempa_v2_user

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web
          path: build/web/
          retention-days: 1

  matrix-deploy:
    name: Deploy ${{ matrix.domain }}
    needs: [changes, build-web]
    if: always() && needs.changes.result == 'success' && (needs.build-web.result == 'success' || needs.build-web.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - domain: api
            kind: api
            local_dir: build/deploy_api/
            remote_dir: api.kakiempat.com/
          - domain: www
            kind: web
            local_dir: build/deploy/www/web/
            remote_dir: public_html/
          - domain: owner
            kind: web
            local_dir: build/deploy/owner/web/
            remote_dir: owner.kakiempat.com/
          - domain: sitter
            kind: web
            local_dir: build/deploy/sitter/web/
            remote_dir: sitter.kakiempat.com/
          - domain: admin
            kind: web
            local_dir: build/deploy/admin/web/
            remote_dir: admin.kakiempat.com/
          - domain: staging
            kind: web
            local_dir: build/deploy/staging/web/
            remote_dir: staging.kakiempat.com/

    steps:
      - name: Skip — tidak ada perubahan di domain ini
        if: needs.changes.outputs[matrix.domain] != 'true'
        run: echo "Skip ${{ matrix.domain }} (path filter: tidak ada delta)"

      - name: Checkout
        if: needs.changes.outputs[matrix.domain] == 'true'
        uses: actions/checkout@v4

      - name: Validasi FTP secrets
        if: needs.changes.outputs[matrix.domain] == 'true'
        run: |
          for key in FTP_SERVER FTP_USERNAME FTP_PASSWORD FTP_PORT; do
            if [[ -z "${!key:-}" ]]; then
              echo "::error::Repository secret $key belum diisi. Lihat .github/DEPLOY_SECRETS.md"
              exit 1
            fi
          done
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}

      - name: Download Flutter web artifact
        if: needs.changes.outputs[matrix.domain] == 'true' && matrix.kind == 'web'
        uses: actions/download-artifact@v4
        with:
          name: flutter-web
          path: build/web

      - name: Paket API
        if: needs.changes.outputs[matrix.domain] == 'true' && matrix.kind == 'api'
        run: bash scripts/ci/prepare_api_package.sh

      - name: Paket web per subdomain
        if: needs.changes.outputs[matrix.domain] == 'true' && matrix.kind == 'web'
        run: bash scripts/ci/prepare_web_package.sh "${{ matrix.domain }}"

      - name: Deploy via FTP (delta sync)
        if: needs.changes.outputs[matrix.domain] == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftp
          local-dir: ./${{ matrix.local_dir }}
          server-dir: ${{ matrix.remote_dir }}
          log-level: standard
          timeout: 600000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.mysql_v2.php
            **/.migrate_v2_secret
            **/.agent_telemetry_secret
            **/.payment_webhook_secret
            **/.payment_config.php
            **/.notifications_path.php
            uploads/**
            backups/**

      - name: Verifikasi API health
        if: needs.changes.outputs[matrix.domain] == 'true' && matrix.domain == 'api'
        run: |
          for url in \
            "https://www.api.kakiempat.com/health.php" \
            "https://api.kakiempat.com/health.php"; do
            code=$(curl -sS -o /tmp/health.json -w "%{http_code}" --max-time 30 "$url" || echo "000")
            echo "$url -> HTTP $code"
            if [[ "$code" == "200" ]]; then
              cat /tmp/health.json
              exit 0
            fi
          done
          echo "::warning::Health check gagal — deploy FTP selesai, cek server manual."

      - name: Ringkasan deploy
        if: needs.changes.outputs[matrix.domain] == 'true'
        run: echo "OK ${{ matrix.domain }} -> ${{ matrix.remote_dir }}"
