# Deploy Kaki Empat v2 — tanpa FTP. Picu git pull dari server via health.php (port 443).

name: 🚀 Kaki Empat v2 Git-Pull Deployment (No-FTP Bypass)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: cpanel-git-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CPANEL_HOST: kakiempat.com
  CPANEL_USER: kakiempa

jobs:
  deploy:
    name: ⚡ Deploy via server webhook
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Validasi secrets
        run: |
          test -n "${{ secrets.FTP_PASSWORD }}"
          test -n "${{ secrets.GIT_DEPLOY_SECRET }}"

      - name: Provision repo Git (idempotent)
        env:
          CPANEL_PASS: ${{ secrets.FTP_PASSWORD }}
          CPANEL_REPO_PATH: ${{ secrets.CPANEL_REPO_PATH }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x scripts/ci/*.sh
          bash scripts/ci/provision_cpanel_git.sh || true

      - name: Bootstrap secret + config (UAPI GET)
        env:
          CPANEL_PASS: ${{ secrets.FTP_PASSWORD }}
          CPANEL_REPO_PATH: ${{ secrets.CPANEL_REPO_PATH }}
          GIT_DEPLOY_SECRET: ${{ secrets.GIT_DEPLOY_SECRET }}
        run: bash scripts/ci/bootstrap_deploy_hook.sh || true

      - name: Upload health.php (deploy trigger)
        env:
          CPANEL_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          chmod +x scripts/ci/cpanel_upload_file.sh
          scripts/ci/cpanel_upload_file.sh /home/kakiempa/api.kakiempat.com health.php hosting/api.kakiempat.com/health.php || \
          scripts/ci/cpanel_curl_retry.sh "Fileman/save_file_content?dir=%2Fhome%2Fkakiempa%2Fapi.kakiempat.com&file=health.php&content=$(python3 -c "import urllib.parse; print(urllib.parse.quote(open('hosting/api.kakiempat.com/health.php').read()))")" 3 || true

      - name: 🌐 Trigger deploy
        env:
          DEPLOY_SECRET: ${{ secrets.GIT_DEPLOY_SECRET }}
          BRANCH: ${{ github.ref_name }}
        run: |
          for attempt in $(seq 1 8); do
            for url in https://api.kakiempat.com/health.php https://www.api.kakiempat.com/health.php; do
              code=$(curl -sS -o /tmp/out.json -w "%{http_code}" --max-time 300 \
                -H "X-Deploy-Secret: ${DEPLOY_SECRET}" \
                "${url}?action=deploy&branch=${BRANCH}&secret=${DEPLOY_SECRET}" || echo "000")
              echo "attempt $attempt $url HTTP $code"
              cat /tmp/out.json || true
              if grep -q '"ok":true' /tmp/out.json 2>/dev/null; then exit 0; fi
            done
            sleep 45
          done
          echo "::error::Deploy gagal — buka cPanel Git > Update from Remote sekali, lalu push ulang"
          exit 1

      - name: Verifikasi health
        run: curl -sS --max-time 30 https://api.kakiempat.com/health.php | grep mysql_ok
